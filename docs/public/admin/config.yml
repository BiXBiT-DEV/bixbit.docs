# Decap CMS → коммиты в GitHub. Sidebar собирается автоматически через vitepress-sidebar.
#
# Сайт: https://andrewmatsiash.github.io/site.ams.docs/
# Админка: https://andrewmatsiash.github.io/site.ams.docs/admin/
#
# base_url — только OAuth-прокси (Cloudflare Worker), не github.io:
#   https://decapcms.org/docs/authentication-backends/#using-github-with-an-oauth-proxy

backend:
  name: github
  repo: AndrewMatsiash/site.ams.docs
  branch: main
  base_url: https://site-ams-decap.bixbit-docs-oauth.workers.dev
  auth_endpoint: /auth

# Картинки из CMS → docs/public/images → на сайте /images/... (с учётом base VitePress)
media_folder: docs/public/images
public_folder: /images

collections:
  - name: docs_root
    label: Страницы (корень docs)
    folder: docs
    create: true
    slug: '{{slug}}'
    extension: md
    format: frontmatter
    identifier_field: title
    fields:
      - { label: Заголовок, name: title, widget: string, required: true }
      - { label: Текст, name: body, widget: markdown }

  - name: docs_root_en
    label: Pages (docs/en root)
    folder: docs/en
    create: true
    slug: '{{slug}}'
    extension: md
    format: frontmatter
    identifier_field: title
    fields:
      - { label: Title, name: title, widget: string, required: true }
      - { label: Body, name: body, widget: markdown }

