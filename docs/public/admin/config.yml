# Decap CMS → коммиты в GitHub через editorial workflow.
# Контент хранится в:
#   docs/...      (en, default locale)
#   docs/ru/...   (ru)

backend:
  name: github
  repo: BiXBiT-DEV/bixbit.docs
  branch: main
  base_url: https://decap-proxy.bixbit-docs-oauth.workers.dev
  auth_endpoint: /auth
  squash_merges: true

publish_mode: editorial_workflow

media_folder: docs/public/images
public_folder: /images

i18n:
  structure: multiple_folders
  locales: [ru, en]
  default_locale: en

collections:
  - name: docs_pages
    label: Documentation Pages (EN default, RU localized)
    label_singular: Documentation Page
    folder: docs
    create: true
    i18n: true
    slug: '{{slug}}'
    nested:
      depth: 10
      summary: '{{title}}'
      subfolders: true
    meta:
      path:
        widget: string
        label: Page path (without /, en, ru, .md)
        hint: 'Examples: whatsminer-firmware | whatsminer-firmware/initial-device-setup'
        index_file: index
    extension: md
    format: frontmatter
    identifier_field: title
    fields:
      - label: Title
        name: title
        widget: string
        required: true
        i18n: true
      - label: Body
        name: body
        widget: markdown
        i18n: true
