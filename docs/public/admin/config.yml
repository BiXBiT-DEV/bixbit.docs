# Decap CMS → коммиты в GitHub через editorial workflow.
# Контент хранится в (i18n: multiple_folders):
#   docs/en/...   (EN, default locale)
#   docs/ru/...   (RU)
#   docs/es/...   (ES)
#   docs/zh/...   (ZH)

backend:
  name: github
  repo: BiXBiT-DEV/bixbit.docs
  branch: main
  base_url: https://decap-proxy.bixbit-docs-oauth.workers.dev
  auth_endpoint: /auth
  squash_merges: true

publish_mode: editorial_workflow

media_folder: docs/public/images
public_folder: /images

i18n:
  structure: multiple_folders
  locales: [en, ru, es, zh]
  default_locale: en

collections:
  - name: posts
    label: Posts
    label_singular: Post
    folder: docs
    create: true
    i18n: true
    filter: { field: "section", value: "posts" }
    path: posts/{{slug}}/index
    nested:
      depth: 3
      summary: '{{title}}'
      subfolders: true
    meta:
      path:
        widget: string
        label: Post path
        hint: 'Example: posts/hello-world'
        index_file: index
    extension: md
    format: frontmatter
    fields:
      - label: Section
        name: section
        widget: hidden
        default: posts
        i18n: duplicate
      - label: Title
        name: title
        widget: string
        required: true
        i18n: true
      - label: Body
        name: body
        widget: markdown
        i18n: true

  - name: docs_pages
    label: Documentation Pages (EN default, RU/ES/ZH localized)
    label_singular: Documentation Page
    folder: docs
    create: true
    i18n: true
    nested:
      depth: 10
      summary: '{{title}}'
      subfolders: true
    meta:
      path:
        widget: string
        label: Page path (without /, locale prefix, .md)
        hint: 'Examples: whatsminer-firmware | whatsminer-firmware/initial-device-setup'
        index_file: index
    extension: md
    format: frontmatter
    fields:
      - label: Title
        name: title
        widget: string
        required: true
        i18n: true
      - label: Body
        name: body
        widget: markdown
        i18n: true
