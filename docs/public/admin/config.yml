# Decap CMS → коммиты в GitHub через editorial workflow.
# Контент хранится по языкам:
#   docs/en/...   (English)
#   docs/ru/...   (Russian)
#   docs/es/...   (Spanish)
#   docs/zh/...   (Chinese)

backend:
  name: github
  repo: BiXBiT-DEV/bixbit.docs
  branch: main
  base_url: https://decap-proxy.bixbit-docs-oauth.workers.dev
  auth_endpoint: /auth
  squash_merges: true

publish_mode: editorial_workflow

media_folder: docs/public/images
public_folder: /images

collections:
  - name: docs_pages_en
    label: Documentation Pages (EN)
    label_singular: Documentation Page
    folder: docs/en
    create: true
    nested:
      depth: 10
      summary: '{{title}}'
      subfolders: true
    meta:
      path:
        widget: string
        label: Page path (without / and .md)
        hint: 'Examples: whatsminer-firmware | whatsminer-firmware/initial-device-setup'
        index_file: index
    extension: md
    format: frontmatter
    fields:
      - label: Title
        name: title
        widget: string
        required: true
      - label: Body
        name: body
        widget: markdown

  - name: docs_pages_ru
    label: Documentation Pages (RU)
