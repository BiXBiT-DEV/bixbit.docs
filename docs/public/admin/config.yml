# Decap CMS → коммиты в GitHub через editorial workflow.
# Контент хранится в:
#   docs/ru/...
#   docs/en/...

backend:
  name: github
  repo: BiXBiT-DEV/bixbit.docs
  branch: main
  base_url: https://site-ams-decap.bixbit-docs-oauth.workers.dev
  auth_endpoint: /auth

publish_mode: editorial_workflow

media_folder: docs/public/images
public_folder: /images

i18n:
  structure: multiple_folders
  locales: [ru, en]
  default_locale: ru

collections:
  - name: docs_pages
    label: Documentation Pages
    label_singular: Documentation Page
    folder: docs
    create: true
    i18n: true
    slug: '{{slug}}'
    nested:
      depth: 10
      summary: '{{title}}'
      subfolders: false
    meta:
      path:
        widget: string
        label: Path
        index_file: index
    extension: md
    format: frontmatter
    identifier_field: title
    fields:
      - label: Title
        name: title
        widget: string
        required: true
        i18n: true
      - label: Body
        name: body
        widget: markdown
        i18n: true
